version: "3.9"

# networks:
#   stock-network:
#     external: true
#     name: kafka_stock-network

services:
  # Bull-Bear Debate API Service
  bullbear-api:
    build: .
    container_name: bullbear-api
    command: uvicorn bull_bear_main:app --host 0.0.0.0 --port 8001 --reload
    # networks:
    #   - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      PATHWAY_API_URL: http://pathway-reports-api:8000
    ports:
      - "8001:8001"
    volumes:
      - ./reports:/app/reports
      - ./debate_data:/app/debate_data
      - ./all_agents:/app/all_agents
      # - ./A-mem:/app/A-mem -> over-riding the A-Mem of docker file which works fine
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Facilitator Report Generator (Pathway Streaming)
  facilitator:
    build: .
    container_name: bullbear-facilitator
    command: python facilitator_main.py
    # networks:
    #   - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ./reports:/app/reports
      - ./debate_data:/app/debate_data
      - .:/app
    restart: unless-stopped
    depends_on:
      bullbear-api:
        condition: service_healthy

volumes:
  reports-data:
  debate-data:

