version: "3.9"

networks:
  stock-network:
    external: true
    name: kafka_stock-network

services: 
  # FastAPI Reports Service
  reports-api:
    build: .
    container_name: pathway-reports-api
    command: uvicorn api.fastapi_server:app --host 0.0.0.0 --port 8000
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
      - ./api:/app/api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Pathway Consumers
  fundamental-consumer:
    build: .
    container_name: pathway-fundamental-consumer
    command: python main_fundamental.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped

  market-consumer:
    build: .
    container_name: pathway-market-consumer
    command: python main_market.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped

  news-consumer:
    build: .
    container_name: pathway-news-consumer
    command: python main_news.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped

  sentiment-consumer:
    build: .
    container_name: pathway-sentiment-consumer
    command: python main_sentiment.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped
