version: "3.9"

networks:
  stock-network:
    external: true
    name: kafka_stock-network

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pathway-redis
    networks:
      - stock-network
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
 
  # FastAPI Reports Service
  reports-api:
    build: .
    container_name: pathway-reports-api
    command: uvicorn api.fastapi_server:app --host 0.0.0.0 --port 8000
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports
      - ./api:/app/api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
# RAG API Service (LangGraph + Pathway)
  rag-api:
    build: .
    container_name: pathway-rag-api
    command: uvicorn api.rag_api:app --host 0.0.0.0 --port 7001
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
    ports:
      - "7001:7001"
    volumes:
      - ./api:/app/api
      - ../knowledge_base:/app/knowledge_base
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Historical Analysis API Service
  historical-analysis-api:
    build: .
    container_name: pathway-historical-analysis-api
    command: uvicorn api.historical_analysis_api:app --host 0.0.0.0 --port 4000
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      # API keys for potential future agent integration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    ports:
      - "4000:4000"
    volumes:
      - ./historical_reports:/app/historical_reports
      - ./api:/app/api
      - ./agents:/app/agents
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Pathway Consumers
  fundamental-consumer:
    build: .
    container_name: pathway-fundamental-consumer
    command: python main_fundamental.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  market-consumer:
    build: .
    container_name: pathway-market-consumer
    command: python main_market.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  news-consumer:
    build: .
    container_name: pathway-news-consumer
    command: python main_news.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports:/app/reports
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  sentiment-consumer:
    build: .
    container_name: pathway-sentiment-consumer
    command: python main_sentiment.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for clustering and LLM
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./reports:/app/reports
      - ./sentiment_cluster_state:/app/sentiment_cluster_state
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # DEMO: Market Data from CSV (no Kafka)
  market-demo:
    build: .
    container_name: pathway-market-demo
    command: python main_market_demo_service.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      # Demo configuration
      DEMO_TICKER: ${DEMO_TICKER:-AAPL}
      DEMO_INTERVAL: ${DEMO_INTERVAL:-5m}
      DEMO_SPEEDUP: ${DEMO_SPEEDUP:-10.0}
      DEMO_DATA_DIR: /app/demo_data
      # Analysis window configuration
      MARKET_LOOKBACK_MINUTES: ${MARKET_LOOKBACK_MINUTES:-10}
      MARKET_HOP_MINUTES: ${MARKET_HOP_MINUTES:-5}
      MIN_DATA_POINTS: ${MIN_DATA_POINTS:-30}
      # API keys for agents
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./reports:/app/reports
      - ../streaming/producers/demo_data:/app/demo_data:ro  # Mount CSV data as read-only
      - .:/app
    restart: "no"  # Don't auto-restart when CSV replay finishes
    profiles:
      - demo  # Only start when explicitly requested with --profile demo

volumes:
  redis-data:

