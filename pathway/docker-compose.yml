version: "3.9"

networks:
  stock-network:
    external: true
    name: kafka_stock-network

services: 
  sentiment-agent:
    build: .
    command: python main_sentiment.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
    volumes:
      - .:/app
    restart: unless-stopped

  market-agent:
    build: .
    command: python main_market.py
    networks:
      - stock-network
    environment:
      KAFKA_BROKER: kafka:29092
    volumes:
      - .:/app
    restart: unless-stopped

  news-agent:
    build: .
    command: python main_news.py
    networks:
      - stock-network
    environment:
      KAFKA_BROKER: kafka:29092
    volumes:
      - .:/app
    restart: unless-stopped
