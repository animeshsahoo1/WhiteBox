version: "3.9"

networks:
  stock-network:
    external: true
    name: kafka_stock-network

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pathway-redis
    networks:
      - stock-network
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FastAPI Reports Service
  reports-api:
    build: .
    container_name: pathway-reports-api
    command: uvicorn api.fastapi_server:app --host 0.0.0.0 --port 8000
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for potential future agent integration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
    ports:
      - "8000:8000"
    volumes:
      - ./reports/fundamental:/app/reports/fundamental
      - ./reports/market:/app/reports/market
      - ./reports/news:/app/reports/news
      - ./reports/sentiment:/app/reports/sentiment
      - ./reports/market_demo:/app/reports/market_demo
      - ./reports/metrics:/app/reports/metrics
      - ./api:/app/api
      - ./metrics:/app/metrics
      - ./historical_reports:/app/historical_reports
      - ./agents:/app/agents
      - ../knowledge_base:/app/knowledge_base
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  # Pathway Consumers
  fundamental-consumer:
    build: .
    container_name: pathway-fundamental-consumer
    command: python main_fundamental.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports/fundamental:/app/reports/fundamental
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  market-consumer:
    build: .
    container_name: pathway-market-consumer
    command: python main_market.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports/market:/app/reports/market
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  news-consumer:
    build: .
    container_name: pathway-news-consumer
    command: python main_news.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for LLM
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # News alert config
      NEWS_ALERT_ENABLED: ${NEWS_ALERT_ENABLED:-true}
      NEWS_ALERT_COOLDOWN: ${NEWS_ALERT_COOLDOWN:-600}
      NEWS_ALERT_MIN_CLUSTERS: ${NEWS_ALERT_MIN_CLUSTERS:-3}
      BULLBEAR_API_URL: http://reports-api:8000
    volumes:
      - ./reports/news:/app/reports/news
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Sentiment Phase 1: Fast Clustering & Scoring (no LLM)
  sentiment-clustering:
    build: .
    container_name: pathway-sentiment-clustering
    command: python main_sentiment_phase1.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for embeddings
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Clusters output directory
      SENTIMENT_CLUSTERS_DIR: /app/reports/sentiment/clusters
      # Alert config
      SENTIMENT_ALERT_ENABLED: ${SENTIMENT_ALERT_ENABLED:-true}
      SENTIMENT_ALERT_MIN: ${SENTIMENT_ALERT_MIN:--0.3}
      SENTIMENT_ALERT_MAX: ${SENTIMENT_ALERT_MAX:-0.3}
      SENTIMENT_ALERT_COOLDOWN: ${SENTIMENT_ALERT_COOLDOWN:-300}
      BULLBEAR_API_URL: http://reports-api:8000
    volumes:
      - ./reports/sentiment:/app/reports/sentiment
      - ./sentiment_phase1_state:/app/sentiment_phase1_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Sentiment Phase 2: LLM Report Generation (reads from Phase 1 cluster files)
  sentiment-reports:
    build: .
    container_name: pathway-sentiment-reports
    command: python main_sentiment_phase2.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for LLM reports
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Clusters input directory (from Phase 1)
      SENTIMENT_CLUSTERS_DIR: /app/reports/sentiment/clusters
      # Report generation interval (seconds) - how often reports can be generated per symbol
      REPORT_GENERATION_INTERVAL: ${REPORT_GENERATION_INTERVAL:-300}
    volumes:
      - ./reports/sentiment:/app/reports/sentiment
      - ./sentiment_phase2_state:/app/sentiment_phase2_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      sentiment-clustering:
        condition: service_started

  # DEMO: Market Data from CSV (no Kafka)
  market-demo:
    build: .
    container_name: pathway-market-demo
    command: python main_market_demo_service.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      # Demo configuration
      DEMO_TICKER: ${DEMO_TICKER:-AAPL}
      DEMO_INTERVAL: ${DEMO_INTERVAL:-5m}
      DEMO_SPEEDUP: ${DEMO_SPEEDUP:-10.0}
      DEMO_DATA_DIR: /app/demo_data
      # Analysis window configuration
      MARKET_LOOKBACK_MINUTES: ${MARKET_LOOKBACK_MINUTES:-10}
      MARKET_HOP_MINUTES: ${MARKET_HOP_MINUTES:-5}
      MIN_DATA_POINTS: ${MIN_DATA_POINTS:-30}
      # API keys for agents
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./reports/market_demo:/app/reports/market_demo
      - ../streaming/producers/demo_data:/app/demo_data:ro # Mount CSV data as read-only
    restart: "no" # Don't auto-restart when CSV replay finishes
    profiles:
      - demo # Only start when explicitly requested with --profile demo

  # DEMO: News Data from CSV (no Kafka) - Tests story clustering
  news-demo:
    build: .
    container_name: pathway-news-demo
    command: python demo_news_pipeline.py --data-dir /app/demo_data
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      # Demo configuration
      NEWS_DEMO_RATE: ${NEWS_DEMO_RATE:-0.5}
      # API keys for headline generation
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./reports/demo_news:/app/reports/demo_news
      - ./demo_kb:/app/demo_kb
      - ../streaming/producers/demo_data:/app/demo_data:ro
    restart: "no"
    profiles:
      - demo

volumes:
  redis-data: