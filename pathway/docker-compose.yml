version: "3.9"

networks:
  stock-network:
    external: true
    name: kafka_stock-network

services:
  # Redis Cache with RediSearch (required for mem0 vector store)
  redis:
    image: redis/redis-stack-server:latest
    container_name: pathway-redis
    networks:
      - stock-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FastAPI Reports Service
  unified-api:
    build: .
    container_name: pathway-unified-api
    command: uvicorn api.fastapi_server:app --host 0.0.0.0 --port 8000
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for agent integration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_MODEL_AGENT: ${OPENAI_MODEL_AGENT:-openai/gpt-4o-mini}
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
      # Parsers API keys
      LANDINGAI_API_KEY: ${LANDINGAI_API_KEY}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY}
      # MCP Server for Strategist
      MCP_SERVER_HOST: mcp-server
      MCP_SERVER_PORT: 9004
      # Mem0 Redis
      MEM0_REDIS_HOST: redis
      MEM0_REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - ./reports/fundamental:/app/reports/fundamental
      - ./reports/market:/app/reports/market
      - ./reports/news:/app/reports/news
      - ./reports/sentiment:/app/reports/sentiment
      - ./reports/market_demo:/app/reports/market_demo
      - ./reports/metrics:/app/reports/metrics
      - ./reports/bullbear:/app/reports/bullbear
      - ./api:/app/api
      - ./metrics:/app/metrics
      - ./historical_reports:/app/historical_reports
      - ../knowledge_base:/app/knowledge_base
      - ./strategies:/app/strategies  # For strategy creation/management
      - ./orchestrator:/app/orchestrator  # Strategist agent module
      - ./pathway_state:/app/pathway_state  # Shared persistence storage
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  # Pathway Consumers
  fundamental-consumer:
    build: .
    container_name: pathway-fundamental-consumer
    command: python main_fundamental.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports/fundamental:/app/reports/fundamental
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  market-consumer:
    build: .
    container_name: pathway-market-consumer
    command: python main_market.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./reports/market:/app/reports/market
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  news-consumer:
    build: .
    container_name: pathway-news-consumer
    command: python main_news.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for LLM
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # News alert config
      NEWS_ALERT_ENABLED: ${NEWS_ALERT_ENABLED:-true}
      NEWS_ALERT_COOLDOWN: ${NEWS_ALERT_COOLDOWN:-600}
      NEWS_ALERT_MIN_CLUSTERS: ${NEWS_ALERT_MIN_CLUSTERS:-3}
      BULLBEAR_API_URL: http://reports-api:8000
    volumes:
      - ./reports/news:/app/reports/news
      - ../knowledge_base:/app/knowledge_base
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Sentiment Phase 1: Fast Clustering & Scoring (no LLM)
  sentiment-clustering:
    build: .
    container_name: pathway-sentiment-clustering
    command: python main_sentiment_phase1.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for embeddings
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Clusters output directory
      SENTIMENT_CLUSTERS_DIR: /app/reports/sentiment/clusters
      # Alert config
      SENTIMENT_ALERT_ENABLED: ${SENTIMENT_ALERT_ENABLED:-true}
      SENTIMENT_ALERT_MIN: ${SENTIMENT_ALERT_MIN:--0.3}
      SENTIMENT_ALERT_MAX: ${SENTIMENT_ALERT_MAX:-0.3}
      SENTIMENT_ALERT_COOLDOWN: ${SENTIMENT_ALERT_COOLDOWN:-300}
      BULLBEAR_API_URL: http://reports-api:8000
    volumes:
      - ./reports/sentiment:/app/reports/sentiment
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Sentiment Phase 2: LLM Report Generation (reads from Phase 1 cluster files)
  sentiment-reports:
    build: .
    container_name: pathway-sentiment-reports
    command: python main_sentiment_phase2.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # API keys for LLM reports
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Clusters input directory (from Phase 1)
      SENTIMENT_CLUSTERS_DIR: /app/reports/sentiment/clusters
      # Report generation interval (seconds) - how often reports can be generated per symbol
      REPORT_GENERATION_INTERVAL: ${REPORT_GENERATION_INTERVAL:-300}
    volumes:
      - ./reports/sentiment:/app/reports/sentiment
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      sentiment-clustering:
        condition: service_started

  # DEMO: Market Data from CSV (no Kafka)
  market-demo:
    build: .
    container_name: pathway-market-demo
    command: python main_market_demo_service.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      # Demo configuration
      DEMO_TICKER: ${DEMO_TICKER:-AAPL}
      DEMO_INTERVAL: ${DEMO_INTERVAL:-5m}
      DEMO_SPEEDUP: ${DEMO_SPEEDUP:-10.0}
      DEMO_DATA_DIR: /app/demo_data
      # Analysis window configuration
      MARKET_LOOKBACK_MINUTES: ${MARKET_LOOKBACK_MINUTES:-10}
      MARKET_HOP_MINUTES: ${MARKET_HOP_MINUTES:-5}
      MIN_DATA_POINTS: ${MIN_DATA_POINTS:-30}
      # API keys for agents
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./reports/market_demo:/app/reports/market_demo
      - ../streaming/producers/demo_data:/app/demo_data:ro # Mount CSV data as read-only
    restart: "no" # Don't auto-restart when CSV replay finishes
    profiles:
      - demo # Only start when explicitly requested with --profile demo

  # Backtesting Pipeline - O(1) incremental strategy backtesting
  backtesting-pipeline:
    build: .
    container_name: pathway-backtesting
    command: python main_backtesting.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      CANDLE_KAFKA_TOPIC: candles
      STRATEGIES_DIR: /app/strategies
      CONSUMER_GROUP: pathway-backtester
      PYTHONUNBUFFERED: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./strategies:/app/strategies
      - ./backtesting_lib:/app/backtesting_lib
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ============================================
  # ORCHESTRATOR SERVICES
  # ============================================

  # MCP Server - Exposes trading tools via Model Context Protocol
  mcp-server:
    build: .
    container_name: pathway-mcp-server
    command: python orchestrator/server.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 9004
      # API connections (internal Docker network)
      REPORTS_API_URL: http://unified-api:8000
      BACKTESTING_API_URL: http://unified-api:8000/backtesting
      # LLM settings
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://openrouter.ai/api/v1}
      OPENAI_MODEL_RISK: ${OPENAI_MODEL_RISK:-google/gemini-2.0-flash-lite-001}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
    ports:
      - "9004:9004"
    volumes:
      - ./orchestrator:/app/orchestrator
    restart: unless-stopped
    depends_on:
      unified-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Orchestrator  - LangGraph + Mem0 ReAct agent
  orchestrator:
    build: .
    container_name: pathway-orchestrator
    command: python orchestrator/langgraph_agent.py
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      # MCP server connection
      MCP_SERVER_HOST: mcp-server
      MCP_SERVER_PORT: 9004
      # LLM settings
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://openrouter.ai/api/v1}
      OPENAI_MODEL_AGENT: ${OPENAI_MODEL_AGENT:-openai/gpt-4o-mini}
      # Mem0 Redis persistence
      MEM0_REDIS_HOST: redis
      MEM0_REDIS_PORT: 6379
    volumes:
      - ./orchestrator:/app/orchestrator
    restart: unless-stopped
    stdin_open: true  # Keep stdin open for interactive mode
    tty: true         # Allocate pseudo-TTY
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - agent  # Only start when explicitly requested with --profile agent

volumes:
  redis-data: