networks:
  stock-network:
    external: true
    name: kafka_stock-network 

services: 
  pathway-processor:
    build: .
    networks:
      - stock-network
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:29092
      PYTHONUNBUFFERED: 1
    volumes:
      - .:/app
      - ./output:/app/output
    restart: unless-stopped