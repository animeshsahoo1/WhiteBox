version: "3.9"

networks:
  stock-network:
    external: true
    name: kafka_stock-network

services:
  pathway-processor:
    build: .
    networks:
      - stock-network
    environment:
      KAFKA_BROKER: kafka:29092
    volumes:
      - .:/app
    restart: unless-stopped

  market-agent:
    build: .
    command: python agents/market_agent.py      # 👈 run only this file
    networks:
      - stock-network
    environment:
      KAFKA_BROKER: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - .:/app
      - ./reports:/app/reports
    restart: unless-stopped
