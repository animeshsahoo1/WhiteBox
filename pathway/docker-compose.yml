# Pathway Consumers & API Services
# When running standalone: start kafka first (creates stock-network)
# When running via root compose: network is shared

include:
  - ../kafka/docker-compose.yml

networks:
  stock-network:
    name: stock-network

# Common build configuration for pathway services
x-pathway-build: &pathway-build
  build:
    context: .
    dockerfile: Dockerfile
    target: final

# Base configuration for services that depend on both Kafka and Redis
x-kafka-redis-consumer: &kafka-redis-consumer
  build:
    context: .
    dockerfile: Dockerfile
    target: final
  networks:
    - stock-network
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

x-common-env: &common-env
  PYTHONUNBUFFERED: 1
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0

services:
  # Redis Cache with RediSearch (required for mem0 vector store)
  redis:
    image: redis/redis-stack-server:latest
    container_name: pathway-redis
    networks:
      - stock-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # FastAPI Reports Service
  unified-api:
    <<: *pathway-build
    container_name: pathway-unified-api
    command: uvicorn api.fastapi_server:app --host 0.0.0.0 --port 8000 --workers 1
    networks:
      - stock-network
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
      MCP_SERVER_HOST: mcp-server
      MCP_SERVER_PORT: 9004
      MEM0_REDIS_HOST: redis
      MEM0_REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - ./reports/fundamental:/app/reports/fundamental
      - ./reports/market:/app/reports/market
      - ./reports/news:/app/reports/news
      - ./reports/sentiment:/app/reports/sentiment
      - ./reports/market_demo:/app/reports/market_demo
      - ./reports/metrics:/app/reports/metrics
      - ./reports/bullbear:/app/reports/bullbear
      - ./api:/app/api
      - ./metrics:/app/metrics
      - ./bullbear/debate:/app/bullbear/debate
      - ./historical_reports:/app/historical_reports
      - ../knowledge_base:/app/knowledge_base
      - ./strategies:/app/strategies
      - ./orchestrator:/app/orchestrator
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Pathway Consumers
  fundamental-consumer:
    <<: *kafka-redis-consumer
    container_name: pathway-fundamental-consumer
    command: python main_fundamental.py
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KAFKA_BROKER: kafka:29092
    volumes:
      - ./reports/fundamental:/app/reports/fundamental
      - ./pathway_state:/app/pathway_state

  market-consumer:
    <<: *kafka-redis-consumer
    container_name: pathway-market-consumer
    command: python main_market.py
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KAFKA_BROKER: kafka:29092
    volumes:
      - ./reports/market:/app/reports/market
      - ./pathway_state:/app/pathway_state

  news-consumer:
    <<: *kafka-redis-consumer
    container_name: pathway-news-consumer
    command: python main_news.py
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KAFKA_BROKER: kafka:29092
      NEWS_ALERT_ENABLED: ${NEWS_ALERT_ENABLED:-true}
      NEWS_ALERT_COOLDOWN: ${NEWS_ALERT_COOLDOWN:-600}
      NEWS_ALERT_MIN_CLUSTERS: ${NEWS_ALERT_MIN_CLUSTERS:-3}
      BULLBEAR_API_URL: http://unified-api:8000
    volumes:
      - ./reports/news:/app/reports/news
      - ../knowledge_base:/app/knowledge_base
      - ./pathway_state:/app/pathway_state

  # Sentiment Phase 1: Fast Clustering & Scoring (no LLM)
  sentiment-clustering:
    <<: *kafka-redis-consumer
    container_name: pathway-sentiment-clustering
    command: python main_sentiment_phase1.py
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KAFKA_BROKER: kafka:29092
      SENTIMENT_CLUSTERS_DIR: /app/reports/sentiment/clusters
      BULLBEAR_API_URL: http://unified-api:8000
    volumes:
      - ./reports/sentiment:/app/reports/sentiment
      - ./pathway_state:/app/pathway_state
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  # Sentiment Phase 2: LLM Report Generation (reads from Phase 1 cluster files)
  sentiment-reports:
    <<: *pathway-build
    container_name: pathway-sentiment-reports
    command: python main_sentiment_phase2.py
    networks:
      - stock-network
    env_file:
      - ../.env
    environment:
      <<: *common-env
      # Generate reports more frequently (default was 100s, set to 10s for faster updates)
      REPORT_GENERATION_INTERVAL: ${REPORT_GENERATION_INTERVAL:-10}
    volumes:
      - ./reports/sentiment:/app/reports/sentiment
      - ./pathway_state:/app/pathway_state
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      sentiment-clustering:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # DEMO: Market Data from CSV (no Kafka)
  market-demo:
    <<: *pathway-build
    container_name: pathway-market-demo
    command: python main_market_demo_service.py
    networks:
      - stock-network
    env_file:
      - ../.env
    environment:
      <<: *common-env
      DEMO_DATA_DIR: /app/demo_data
    volumes:
      - ./reports/market_demo:/app/reports/market_demo
      - ../streaming/producers/demo_data:/app/demo_data:ro
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - demo

  # Backtesting Pipeline - O(1) incremental strategy backtesting
  backtesting-pipeline:
    <<: *kafka-redis-consumer
    container_name: pathway-backtesting
    command: python main_backtesting.py
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KAFKA_BROKER: kafka:29092
      CANDLE_KAFKA_TOPIC: candles
      STRATEGIES_DIR: /app/strategies
      CONSUMER_GROUP: pathway-backtester
    volumes:
      - ./strategies:/app/strategies
      - ./backtesting_lib:/app/backtesting_lib

  # Drift Detection Pipeline - Concept drift monitoring with River
  drift-detection:
    <<: *kafka-redis-consumer
    container_name: pathway-drift-detection
    command: python main_drift.py
    env_file:
      - ../.env
    environment:
      <<: *common-env
      KAFKA_BROKER: kafka:29092
      MARKET_TOPIC: market-data
      DRIFT_ALERT_ENABLED: ${DRIFT_ALERT_ENABLED:-true}
      DRIFT_ALERT_COOLDOWN: ${DRIFT_ALERT_COOLDOWN:-300}
      BULLBEAR_API_URL: http://unified-api:8000
    volumes:
      - ./agents:/app/agents
      - ./consumers:/app/consumers
      - ./pathway_state:/app/pathway_state

  # ============================================
  # ORCHESTRATOR SERVICES
  # ============================================

  # MCP Server - Exposes trading tools via Model Context Protocol
  mcp-server:
    <<: *pathway-build
    container_name: pathway-mcp-server
    command: python orchestrator/server.py
    networks:
      - stock-network
    env_file:
      - ../.env
    environment:
      <<: *common-env
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 9004
      REPORTS_API_URL: http://unified-api:8000
      BACKTESTING_API_URL: http://unified-api:8000/backtesting
    ports:
      - "9004:9004"
    volumes:
      - ./orchestrator:/app/orchestrator
    restart: unless-stopped
    depends_on:
      unified-api:
        condition: service_healthy
    healthcheck:
      # MCP server returns 406 for GET /mcp (requires proper MCP headers)
      # Use nc to check if port is listening instead
      test: ["CMD", "sh", "-c", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9004/ | grep -q '404'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Orchestrator - LangGraph + Mem0 ReAct agent
  orchestrator:
    <<: *pathway-build
    container_name: pathway-orchestrator
    command: python orchestrator/langgraph_agent.py
    networks:
      - stock-network
    env_file:
      - ../.env
    environment:
      <<: *common-env
      MCP_SERVER_HOST: mcp-server
      MCP_SERVER_PORT: 9004
      MEM0_REDIS_HOST: redis
      MEM0_REDIS_PORT: 6379
    volumes:
      - ./orchestrator:/app/orchestrator
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      mcp-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - agent
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  redis-data:
