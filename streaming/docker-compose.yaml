# When running standalone: start kafka first (creates stock-network)
# When running via root compose: network is shared

include:
  - ../kafka/docker-compose.yml

networks:
  stock-network:
    name: stock-network

# ============================================
# YAML Anchors for DRY Configuration
# ============================================
x-streaming-base: &streaming-base
  build:
    context: .
    dockerfile: Dockerfile
    target: final
  restart: unless-stopped
  networks:
    - stock-network
  depends_on:
    kafka:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 128M

x-common-env: &common-env
  KAFKA_BROKER: kafka:29092

services:
  # Hybrid Market Producer: Historical data first, then real-time updates
  market-producer:
    <<: *streaming-base
    command: ["python", "producers/market_data_producer.py"]
    environment:
      <<: *common-env
      MARKET_HISTORICAL_PERIOD: ${MARKET_HISTORICAL_PERIOD:-1d}
      MARKET_HISTORICAL_INTERVAL: ${MARKET_HISTORICAL_INTERVAL:-1m}
      MARKET_DATA_INTERVAL: ${MARKET_DATA_INTERVAL:-60}
    env_file:
      - ../.env

  news-producer:
    <<: *streaming-base
    command: ["python", "producers/news_producer.py"]
    environment:
      <<: *common-env
    env_file:
      - ../.env

  sentiment-producer:
    <<: *streaming-base
    command: ["python", "producers/sentiment_producer.py"]
    environment:
      <<: *common-env
      WEBHOOK_URL: http://twitter-webhook:5001
    env_file:
      - ../.env
    volumes:
      - ./sentiment_logs:/app/sentiment_logs

  fundamental-producer:
    <<: *streaming-base
    command: ["python", "producers/fundamental_data_producer.py"]
    environment:
      <<: *common-env
    env_file:
      - ../.env

  fundamental-report-producer:
    <<: *streaming-base
    command: ["python", "producers/fundamental_report.py"]
    environment:
      <<: *common-env
      KNOWLEDGE_BASE_DIR: /knowledge_base
    env_file:
      - ../.env
    volumes:
      - ../knowledge_base:/knowledge_base

  # Multi-symbol × multi-interval candle producer
  candle-producer:
    <<: *streaming-base
    command: ["python", "producers/candle_producer.py"]
    environment:
      <<: *common-env
    env_file:
      - ../.env
    volumes:
      - ./data:/app/data

  twitter-webhook:
    <<: *streaming-base
    command: ["python", "webhook_receiver.py"]
    depends_on: {}
    environment:
      WEBHOOK_RECEIVER_PORT: 5001
    ports:
      - "5001:5001"
    volumes:
      - .:/app

  # Cloudflare Tunnel
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - twitter-webhook
    networks:
      - stock-network
