# WebSocket Server
# When running standalone: start pathway first (provides redis)
# When running via root compose: redis is shared via pathway

include:
  - ../pathway/docker-compose.yml

networks:
  stock-network:
    name: stock-network

# ============================================
# YAML Anchors for DRY Configuration
# ============================================
x-websocket-build: &websocket-build
  build:
    context: .
    dockerfile: Dockerfile
    target: final

services:
  fastapi-app:
    <<: *websocket-build
    container_name: websocket-fastapi
    networks:
      - stock-network
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    volumes:
      - .:/code
    working_dir: /code
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --ws-ping-interval 30 --ws-ping-timeout 30
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
