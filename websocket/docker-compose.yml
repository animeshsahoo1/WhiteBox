services:
  fastapi-app:
    build: .
    container_name: websocket-fastapi
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}  # Pass from .env
    volumes:
      - .:/code
    working_dir: /code
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped