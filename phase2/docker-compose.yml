version: '3.8'

services:
  # Redis (for hypothesis caching)
  redis:
    image: redis:7-alpine
    container_name: phase2-redis
    ports:
      - "9003:9003"
    networks:
      - phase2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hypothesis Generator (MCP Server)
  hypothesis-generator:
    build:
      context: ..
      dockerfile: phase2/Dockerfile
    container_name: phase2-hypothesis-generator
    command: python -m hypothesis_generator.generator
    env_file:
      - .env
    ports:
      - "9002:9002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - phase2-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Hypothesis Query API
  hypothesis-api:
    build:
      context: ..
      dockerfile: phase2/Dockerfile
    container_name: phase2-hypothesis-api
    command: python -m hypothesis_generator.app
    env_file:
      - .env
    ports:
      - "9001:9001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - phase2-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Risk Managers (MCP Server)
  risk-managers:
    build:
      context: ..
      dockerfile: phase2/Dockerfile
    container_name: phase2-risk-managers
    command: python -m risk_managers.risk_assessment
    env_file:
      - .env
    ports:
      - "9004:9004"
    networks:
      - phase2-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backtesting API (FastAPI)
  backtesting-api:
    build:
      context: ..
      dockerfile: phase2/Dockerfile
    container_name: phase2-backtesting-api
    command: python -m backtesting.backtesting_api
    env_file:
      - .env
    ports:
      - "9005:9005"
    networks:
      - phase2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Orchestrator (Conversational Interface)
  orchestrator:
    build:
      context: ..
      dockerfile: phase2/Dockerfile
    container_name: phase2-orchestrator
    command: python run_conversational_orchestrator.py
    env_file:
      - .env
    volumes:
      - ../phase2:/app/phase2
    depends_on:
      hypothesis-generator:
        condition: service_started
      risk-managers:
        condition: service_started
      backtesting-api:
        condition: service_healthy
    networks:
      - phase2-network
    restart: "no"
    stdin_open: true
    tty: true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit UI
  streamlit:
    build:
      context: ..
      dockerfile: phase2/Dockerfile
    container_name: phase2-streamlit
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      hypothesis-generator:
        condition: service_started
      risk-managers:
        condition: service_started
      backtesting-api:
        condition: service_healthy
    networks:
      - phase2-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  phase2-network:
    driver: bridge
